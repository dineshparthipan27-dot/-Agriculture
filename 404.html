<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | Kisan Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            
            --primary: #d97706; 
            --primary-dark: #b45309;
            --secondary: #15803d; 
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 70px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .error-code {
            font-size: 80px;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 10px;
            line-height: 1;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--primary);
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3);
        }

       
        @media (max-width: 480px) {
            .error-code { font-size: 60px; }
            .error-icon { font-size: 50px; }
            h1 { font-size: 18px; }
            p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="error-container">
     
        <div class="error-icon">
            <i class="fa-solid fa-tractor"></i>
        </div>
        
        <div class="error-code">404</div>
        
        <h1>Oops! You’ve come to the wrong place.
 </h1>
        <p>The page you're looking for isn't here. Just like taking a wrong turn in a farm field, it looks like you've wandered off track on our website too!
</p>
        
       
        <a href="index.html" class="btn">
            <i class="fa-solid fa-house"></i> Back to Signin
        </a>
    </div>

</body>
</html>
